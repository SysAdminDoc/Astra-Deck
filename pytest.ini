[pytest]
qt_api = pyqt6
testpaths = astra_downloader
python_files = test_*.py
# pytest-asyncio is pulled in as a transitive dep but the downloader tests
# themselves are entirely synchronous. Pin the future-default loop scope so
# the PytestDeprecationWarning ("The configuration option ...
# asyncio_default_fixture_loop_scope is unset") doesn't pollute every test
# run. The value matches the upcoming default in pytest-asyncio 1.0.
asyncio_default_fixture_loop_scope = function
