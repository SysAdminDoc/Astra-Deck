name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Catalogs & Syntax
        run: |
          npm test
          npm run check

      - name: Build Release Artifacts
        run: npm run build:userscript

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YouTube-Kit-build-artifacts
          path: build/*
          if-no-files-found: error

      - name: Verify tag matches manifest version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -e "console.log(require('./extension/manifest.json').version)")
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag version ($TAG_VERSION) does not match manifest version ($MANIFEST_VERSION)"
            exit 1
          fi

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create "${{ github.ref_name }}" build/* --generate-notes 2>/dev/null \
            || gh release upload "${{ github.ref_name }}" build/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
