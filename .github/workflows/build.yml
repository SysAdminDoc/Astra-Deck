name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Catalogs & Syntax
        run: |
          npm test
          npm run check

      - name: Verify tag matches version surfaces
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          node scripts/check-versions.js --tag "$TAG_VERSION"

      - name: Build Release Artifacts
        env:
          ASTRA_CRX_KEY_MODE: ephemeral
        run: npm run build:userscript

      - name: Emit release SBOM
        run: npm sbom --omit=dev --sbom-format cyclonedx > build/astra-deck-npm-sbom.cdx.json

      - name: Generate release manifest
        run: npm run release:manifest

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: astra-deck-build-artifacts
          path: build/*
          if-no-files-found: error

      - name: Attest build provenance
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: build/*

      - name: Attest npm SBOM
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/attest-sbom@v4
        with:
          subject-path: build/*
          sbom-path: build/astra-deck-npm-sbom.cdx.json
