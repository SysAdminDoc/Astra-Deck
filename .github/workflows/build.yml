name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Catalogs & Syntax
        run: |
          npm test
          npm run check

      - name: Verify tag matches manifest, ytkit.js, and userscript versions
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -e "console.log(require('./extension/manifest.json').version)")
          YTKIT_VERSION=$(node -e "const m=require('fs').readFileSync('extension/ytkit.js','utf8').match(/const YTKIT_VERSION = '([^']+)'/); console.log(m?m[1]:'')")
          USERSCRIPT_VERSION=$(node -e "const m=require('fs').readFileSync('YTKit.user.js','utf8').match(/^\\/\\/ @version\\s+(\\S+)/m); console.log(m?m[1]:'')")
          PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version)")
          FAIL=0
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) != manifest.json ($MANIFEST_VERSION)"; FAIL=1
          fi
          if [ "$TAG_VERSION" != "$YTKIT_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) != ytkit.js YTKIT_VERSION ($YTKIT_VERSION)"; FAIL=1
          fi
          if [ "$TAG_VERSION" != "$USERSCRIPT_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) != YTKit.user.js @version ($USERSCRIPT_VERSION)"; FAIL=1
          fi
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "::error::Tag ($TAG_VERSION) != package.json ($PACKAGE_VERSION)"; FAIL=1
          fi
          if [ $FAIL -ne 0 ]; then exit 1; fi

      - name: Build Release Artifacts
        run: npm run build:userscript

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-deck-build-artifacts
          path: build/*
          if-no-files-found: error

      - name: Release
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          gh release create "${{ github.ref_name }}" build/* --generate-notes \
            || gh release upload "${{ github.ref_name }}" build/* --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
