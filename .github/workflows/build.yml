name: Build & Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Verify Catalogs & Syntax
        run: |
          npm test
          npm run check

      - name: Verify tag matches version surfaces
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          node scripts/check-versions.js --tag "$TAG_VERSION"

      - name: Build Release Artifacts
        env:
          ASTRA_CRX_KEY_MODE: ephemeral
        run: npm run build:userscript

      - name: Setup Firefox
        id: setup-firefox
        uses: browser-actions/setup-firefox@0bc507ddf224827e3b1af68e014d5e42ab93e795 # v1.7.2
        with:
          firefox-version: latest

      - name: Firefox store-safe smoke
        run: npm run smoke:firefox -- --firefox "${{ steps.setup-firefox.outputs.firefox-path }}"

      - name: Emit release SBOM
        run: npm sbom --omit=dev --sbom-format cyclonedx > build/astra-deck-npm-sbom.cdx.json

      - name: Generate release manifest
        run: npm run release:manifest

      - name: Generate release readiness report
        run: npm run release:readiness -- --require-pass

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: astra-deck-build-artifacts
          path: build/*
          if-no-files-found: error

      # Attestation steps are retried once: sigstore/rekor outages are transient
      # (a timeout failed the v4.46.2 release), but a release must never ship
      # silently unattested — the retry step is fatal if it fails too.
      - name: Attest build provenance
        id: attest-provenance
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: build/*

      - name: Attest build provenance (retry)
        if: startsWith(github.ref, 'refs/tags/') && steps.attest-provenance.outcome == 'failure'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4
        with:
          subject-path: build/*

      - name: Attest npm SBOM
        id: attest-sbom
        if: startsWith(github.ref, 'refs/tags/')
        continue-on-error: true
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-path: build/*
          sbom-path: build/astra-deck-npm-sbom.cdx.json

      - name: Attest npm SBOM (retry)
        if: startsWith(github.ref, 'refs/tags/') && steps.attest-sbom.outcome == 'failure'
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4
        with:
          subject-path: build/*
          sbom-path: build/astra-deck-npm-sbom.cdx.json
