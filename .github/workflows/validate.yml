name: Validate

# PR-time validation for the v4.46.0+ autonomous-loop sprint. The
# release path (.github/workflows/build.yml) runs on tag pushes only —
# regressions used to land before tag-build CI caught them. This
# workflow closes that gap by running the same checks on every PR and
# every push to main.
#
# Tag pushes (v*) deliberately skip this workflow because build.yml
# already runs npm test + npm run check on the tagged commit, and
# duplicating the work would just slow release feedback.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: moderate
          vulnerability-check: true
          license-check: false

  js:
    name: JS tests + check gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: npm test
        run: npm test

      - name: npm run check
        run: npm run check

      # v4.47.0 NF20: emit an npm SBOM artifact so a future store
      # submission has a software-bill-of-materials to attach. The
      # static-eval gate already runs inside `npm run check` via
      # scripts/check-no-eval.js.
      - name: Emit npm SBOM
        run: npm ls --omit=dev --json > sbom.json
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: astra-deck-sbom
          path: sbom.json
          if-no-files-found: ignore

  python-audit:
    name: Python dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: astra_downloader/requirements.txt

      - name: Install pip-audit
        run: |
          python -m pip install --upgrade pip
          python -m pip install pip-audit

      - name: pip-audit requirements
        run: |
          python -m pip_audit -r astra_downloader/requirements.txt --format json --progress-spinner off --output pip-audit.json

      - name: Upload Python audit artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: astra-downloader-pip-audit
          path: pip-audit.json
          if-no-files-found: ignore

  python:
    name: Python downloader tests
    runs-on: ubuntu-latest
    env:
      ASTRA_DOWNLOADER_NO_BOOTSTRAP: "1"
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: astra_downloader/requirements.txt

      - name: Install Qt Runtime Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libgl1 \
            libxkbcommon-x11-0 \
            libxcb-cursor0 \
            libxcb-icccm4 \
            libxcb-image0 \
            libxcb-keysyms1 \
            libxcb-randr0 \
            libxcb-render-util0 \
            libxcb-shape0 \
            libxcb-xfixes0 \
            libxcb-xinerama0

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r astra_downloader/requirements.txt
          python -m pip install pytest pytest-asyncio pytest-qt

      - name: Verify PyQt Runtime
        run: |
          python - <<'PY'
          import os
          import sys

          os.environ.setdefault("QT_QPA_PLATFORM", "offscreen")
          try:
              from PyQt6.QtWidgets import QApplication
          except Exception as exc:
              print(f"::error title=PyQt6 runtime unavailable::{type(exc).__name__}: {exc}")
              print("Install or refresh Linux Qt runtime packages in validate.yml before running downloader tests.")
              sys.exit(1)

          app = QApplication.instance() or QApplication([])
          print(f"PyQt6 runtime OK with QT_QPA_PLATFORM={os.environ.get('QT_QPA_PLATFORM')}")
          app.quit()
          PY

      - name: pytest
        run: python -m pytest astra_downloader
