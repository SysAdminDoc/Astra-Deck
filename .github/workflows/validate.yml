name: Validate

# PR-time validation for the v4.46.0+ autonomous-loop sprint. The
# release path (.github/workflows/build.yml) runs on tag pushes only —
# regressions used to land before tag-build CI caught them. This
# workflow closes that gap by running the same checks on every PR and
# every push to main.
#
# Tag pushes (v*) deliberately skip this workflow because build.yml
# already runs npm test + npm run check on the tagged commit, and
# duplicating the work would just slow release feedback.

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  js:
    name: JS tests + check gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: npm test
        run: npm test

      - name: npm run check
        run: npm run check

      # v4.47.0 NF20: emit an npm SBOM artifact so a future store
      # submission has a software-bill-of-materials to attach. The
      # static-eval gate already runs inside `npm run check` via
      # scripts/check-no-eval.js.
      - name: Emit npm SBOM
        run: npm ls --omit=dev --json > sbom.json
        continue-on-error: true

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: astra-deck-sbom
          path: sbom.json
          if-no-files-found: ignore

  python:
    name: Python downloader tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: astra_downloader/requirements.txt

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r astra_downloader/requirements.txt
          python -m pip install pytest

      - name: pytest
        run: python -m pytest astra_downloader
