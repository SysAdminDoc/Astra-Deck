<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>YTKit Settings</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0b;
            color: #cdd6f4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        .container {
            background: #11111b;
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            padding: 32px;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 28px;
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            color: #cdd6f4;
        }
        h1 span { color: #ff4e45; }
        .version {
            font-size: 12px;
            color: #585b70;
            background: rgba(255,255,255,0.04);
            padding: 2px 8px;
            border-radius: 4px;
        }
        section {
            margin-bottom: 24px;
        }
        section:last-child { margin-bottom: 0; }
        h2 {
            font-size: 13px;
            font-weight: 600;
            color: #a6adc8;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 12px;
        }
        .button-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        button {
            background: #1e1e2e;
            color: #cdd6f4;
            border: 1px solid rgba(255,255,255,0.08);
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, border-color 0.15s;
        }
        button:hover {
            background: #313244;
            border-color: rgba(255,255,255,0.12);
        }
        button.danger {
            color: #f38ba8;
            border-color: rgba(243,139,168,0.15);
        }
        button.danger:hover {
            background: rgba(243,139,168,0.1);
            border-color: rgba(243,139,168,0.3);
        }
        .status {
            margin-top: 10px;
            font-size: 12px;
            padding: 8px 12px;
            border-radius: 6px;
            display: none;
        }
        .status.success {
            display: block;
            background: rgba(166,227,161,0.08);
            color: #a6e3a1;
            border: 1px solid rgba(166,227,161,0.15);
        }
        .status.error {
            display: block;
            background: rgba(243,139,168,0.08);
            color: #f38ba8;
            border: 1px solid rgba(243,139,168,0.15);
        }
        #storage-info {
            font-size: 12px;
            color: #585b70;
            background: rgba(255,255,255,0.02);
            padding: 8px 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.04);
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>YT<span>Kit</span></h1>
            <span class="version" id="version"></span>
        </header>
        <section>
            <h2>Settings Management</h2>
            <div class="button-group">
                <button id="export-btn">Export Settings</button>
                <button id="import-btn">Import Settings</button>
                <input type="file" id="import-file" accept=".json" hidden>
                <button id="reset-btn" class="danger">Reset All Settings</button>
            </div>
            <div class="status" id="status"></div>
        </section>
        <section>
            <h2>Storage</h2>
            <div id="storage-info">Loading...</div>
        </section>
    </div>
    <script src="options.js"></script>
</body>
</html>
