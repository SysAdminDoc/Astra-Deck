<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title data-i18n="popupTitle">Astra Deck</title>
<link rel="stylesheet" href="popup.css">
</head>
<body role="dialog" aria-modal="true" aria-labelledby="popup-title">
<div class="page-shell">

  <header class="app-bar">
    <div class="app-brand">
      <div class="brand-icon-shell" aria-hidden="true">
        <img class="brand-icon" src="icons/32.png" alt="" width="20" height="20">
      </div>
      <span class="brand-name" data-i18n="brandName">Astra Deck</span>
      <span class="brand-version" id="version">v—</span>
    </div>
    <div class="app-status" id="contextState" data-i18n-attr-aria-label="contextStateAriaLabel" aria-label="Tab context" data-i18n="contextStateLocal">Local</div>
  </header>

  <main class="options-workspace" aria-labelledby="popup-title">
    <section class="workspace-command">
      <div class="workspace-copy">
        <span class="workspace-eyebrow" data-i18n="workspaceEyebrow">Settings workspace</span>
        <h1 class="workspace-title" id="popup-title" data-i18n="workspaceTitle">Controls and local data</h1>
        <p id="supportNote" data-i18n="workspaceSupport">Changes sync to open YouTube tabs automatically.</p>
      </div>
      <div class="main-action">
        <button id="openPanel" class="cta-button" type="button" data-i18n="openFullSettings">Open Full Settings</button>
      </div>
    </section>

    <section class="storage-overview" data-i18n-attr-aria-label="storageStatsAriaLabel" aria-label="Storage statistics">
      <div class="stat-card">
        <strong class="stat-card-value" id="stat-keys">—</strong>
        <span class="stat-card-label" data-i18n="statKeys">Keys</span>
      </div>
      <div class="stat-card">
        <strong class="stat-card-value" id="stat-size">—</strong>
        <span class="stat-card-label" data-i18n="statStorage">Storage</span>
      </div>
      <div class="stat-card">
        <strong class="stat-card-value" id="stat-hidden-videos">—</strong>
        <span class="stat-card-label" data-i18n="statHidden">Hidden</span>
      </div>
      <div class="stat-card">
        <strong class="stat-card-value" id="stat-blocked-channels">—</strong>
        <span class="stat-card-label" data-i18n="statBlocked">Blocked</span>
      </div>
      <div class="stat-card">
        <strong class="stat-card-value" id="stat-bookmarks">—</strong>
        <span class="stat-card-label" data-i18n="statBookmarks">Bookmarks</span>
      </div>
    </section>

    <aside class="health-banner" id="health-banner" role="status" aria-live="polite" hidden>
      <span class="health-icon" aria-hidden="true">!</span>
      <span class="health-copy">
        <strong class="health-title" id="health-title" data-i18n="healthTitle">Diagnostics</strong>
        <span class="health-detail" id="health-detail"></span>
      </span>
      <button type="button" class="health-copy-btn" id="health-copy-btn" data-i18n-attr-aria-label="healthCopyAria" aria-label="Copy diagnostic details" data-i18n="healthCopyBtn">Copy</button>
      <button type="button" class="health-copy-btn" id="health-save-btn" data-i18n-attr-aria-label="healthSaveAria" aria-label="Save diagnostic log as JSON" data-i18n="healthSaveBtn">Save</button>
      <button type="button" class="health-clear-btn" id="health-clear-btn" data-i18n-attr-aria-label="healthClearAria" aria-label="Clear diagnostic log" data-i18n="healthClearBtn">Clear</button>
    </aside>

    <nav class="actions-row" data-i18n-attr-aria-label="dataMgmtAria" aria-label="Data management">
      <div class="button-row">
        <button id="export-btn" type="button" data-i18n="exportBtn">Export</button>
        <button id="import-btn" type="button" data-i18n="importBtn">Import</button>
        <input type="file" id="import-file" accept=".json,application/json" hidden>
        <label class="language-inline" for="languageSelect">
          <span class="sr-only" data-i18n="languageSelectLabel">Display language</span>
          <select id="languageSelect" name="language" data-i18n-attr-title="languageTitle" title="Display language">
            <option value="auto" data-i18n="languageAuto">Auto (browser default)</option>
            <option value="en" data-i18n="languageEn">English</option>
            <option value="de" data-i18n="languageDe">Deutsch (German)</option>
            <option value="es" data-i18n="languageEs">Español (Spanish)</option>
            <option value="fr" data-i18n="languageFr">Français (French)</option>
            <option value="it" data-i18n="languageIt">Italiano (Italian)</option>
            <option value="ja" data-i18n="languageJa">日本語 (Japanese)</option>
            <option value="ko" data-i18n="languageKo">한국어 (Korean)</option>
            <option value="pt_BR" data-i18n="languagePtBr">Português (Brazilian Portuguese)</option>
            <option value="ru" data-i18n="languageRu">Русский (Russian)</option>
            <option value="zh_CN" data-i18n="languageZhCn">简体中文 (Simplified Chinese)</option>
          </select>
        </label>
      </div>
      <div class="actions-end">
        <button id="reset-btn" class="danger" type="button" data-i18n="resetBtn">Reset</button>
      </div>
    </nav>

    <div class="status" id="status" aria-live="polite"></div>

    <section class="quick-toggles-section" aria-labelledby="quick-toggles-title">
      <div class="section-head">
        <div class="section-head-copy">
          <span class="section-eyebrow" data-i18n="quickTogglesEyebrow">Quick toggles</span>
          <h2 class="section-title" id="quick-toggles-title"><strong id="enabledCount">0</strong> <span id="enabledLabel" data-i18n="enabledLabel">enabled</span> · <span id="resultsState">15 controls</span></h2>
        </div>
      </div>

      <div class="search-row">
        <label class="sr-only" for="q" data-i18n="filterTogglesLabel">Filter quick toggles</label>
        <svg class="search-icon" aria-hidden="true" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="q" name="quick-toggle-filter" type="search" data-i18n-attr-placeholder="filterTogglesPlaceholder" placeholder="Filter toggles…" data-i18n-attr-aria-label="filterTogglesLabel" aria-label="Filter quick toggles" autocomplete="off" spellcheck="false">
        <button id="clearSearch" class="clear-search" type="button" data-i18n-attr-aria-label="clearFilterAria" aria-label="Clear quick toggle filter" hidden>&times;</button>
      </div>

      <div id="toggles" class="toggles" data-i18n-attr-aria-label="quickTogglesAria" aria-label="Quick toggles"></div>
    </section>
  </main>

</div>

<!-- Inline confirmation dialog — avoids native confirm() and matches the
     rest of the popup's theme. -->
<div class="confirm-shell" id="confirm-shell" hidden>
  <div class="confirm-backdrop" data-close-confirm></div>
  <section class="confirm-dialog" id="confirm-dialog" role="dialog" aria-modal="true" aria-labelledby="confirm-title" aria-describedby="confirm-copy">
    <span class="confirm-eyebrow" id="confirm-eyebrow" data-i18n="confirmEyebrow">Confirm</span>
    <h2 class="confirm-title" id="confirm-title"></h2>
    <p class="confirm-copy" id="confirm-copy"></p>
    <div class="confirm-actions">
      <button type="button" id="confirm-cancel-btn"></button>
      <button type="button" id="confirm-accept-btn"></button>
    </div>
  </section>
</div>

<script src="popup.js"></script>
</body>
</html>
