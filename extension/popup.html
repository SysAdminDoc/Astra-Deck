<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Astra Deck</title>
<link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="wrap">
  <header>
    <img src="icons/48.png" alt="" width="28" height="28">
    <div>
      <h1>Astra Deck</h1>
      <div class="sub" id="version">v—</div>
    </div>
  </header>
  <div class="search-row">
    <label class="sr-only" for="q">Filter quick toggles</label>
    <input id="q" name="quick-toggle-filter" type="search" placeholder="Filter toggles…" aria-label="Filter quick toggles" autocomplete="off" spellcheck="false" autofocus>
  </div>
  <section id="toggles" class="toggles" aria-label="Quick toggles"></section>
  <footer>
    <button id="openPanel" class="primary" type="button">Open full settings panel</button>
    <button id="openOptions" class="ghost" type="button">Options page</button>
  </footer>
</div>
<script src="popup.js"></script>
</body>
</html>
